<script type="module">

    // ============================================================
    // SOULVERSE VOXEL – ULTIMATE GRAPHICS EDITION

    const CHUNK_SIZE = 16, RENDER_DIST = 5;
    const BLOCK_TYPES = { AIR:0, DIRT:1, GRASS:2, STONE:3, PROFIT:4, LOVE:5, TAX:6 };

    })();

    function getBlockType(wx, wy, wz) {
        const h = 10 + noise(wx*0.05, 0, wz*0.05)*4 + Math.sin(wx*0.2)*Math.cos(wz*0.2)*2;
        if (wy > Math.floor(h)) return BLOCK_TYPES.AIR;
        const biome = noise(wx*0.02, wz*0.02, 0);
        if (wy === Math.floor(h)) { if (biome > 0.3) return BLOCK_TYPES.PROFIT; else if (biome < -0.3) return BLOCK_TYPES.LOVE; else return BLOCK_TYPES.GRASS; }
        if (wy > h-2) return BLOCK_TYPES.DIRT;
        return BLOCK_TYPES.STONE;
    }

    function generateChunk(cx, cz) {
        const blocks = new Array(CHUNK_SIZE*CHUNK_SIZE*CHUNK_SIZE).fill(0);
        for (let x=0;x<CHUNK_SIZE;x++) for (let z=0;z<CHUNK_SIZE;z++) {
            const wx = cx*CHUNK_SIZE+x, wz = cz*CHUNK_SIZE+z;
            for (let y=0;y<CHUNK_SIZE;y++) { const type = getBlockType(wx, y, wz); if (type !== BLOCK_TYPES.AIR) blocks[y*CHUNK_SIZE*CHUNK_SIZE + z*CHUNK_SIZE + x] = type; }
        }
        return blocks;
    }

    function buildChunkMesh(cx, cz) {
        const blocks = chunkData.get(`${cx},${cz}`); if (!blocks) return null;

            const v = (a,b,c) => new THREE.Vector3(x+a,y+b,z+c), col = new THREE.Color(BLOCK_COLORS[type]);
            const face = (a,b,c,d) => { const s = positions.length/3; [a,b,c,d].forEach(p=>{positions.push(p.x,p.y,p.z);colors.push(col.r,col.g,col.b);}); indices.push(s,s+1,s+2,s+2,s+3,s); };
            face(v(0,0,0),v(1,0,0),v(1,1,0),v(0,1,0)); face(v(0,0,1),v(1,0,1),v(1,1,1),v(0,1,1));
            face(v(0,0,0),v(1,0,0),v(1,0,1),v(0,0,1)); face(v(0,1,0),v(1,1,0),v(1,1,1),v(0,1,1));
            face(v(0,0,0),v(0,1,0),v(0,1,1),v(0,0,1)); face(v(1,0,0),v(1,1,0),v(1,1,1),v(1,0,1));
        };
        for (let x=0;x<CHUNK_SIZE;x++) for (let z=0;z<CHUNK_SIZE;z++) for (let y=0;y<CHUNK_SIZE;y++) { const idx = y*CHUNK_SIZE*CHUNK_SIZE+z*CHUNK_SIZE+x; if (blocks[idx] !== BLOCK_TYPES.AIR) addCube(x,y,z,blocks[idx]); }
        geom.setAttribute('position', new THREE.Float32Array(positions), 3); geom.setAttribute('color', new THREE.Float32Array(colors), 3); geom.setIndex(indices); geom.computeVertexNormals();

    }

    function rebuildChunkMesh(cx, cz) { const key = `${cx},${cz}`; const old = chunkMeshes.get(key); if (old) scene.remove(old); const mesh = buildChunkMesh(cx, cz); if (mesh) { scene.add(mesh); chunkMeshes.set(key, mesh); } else chunkMeshes.delete(key); }

    function updateChunks() {
        const cx = Math.floor(player.x/CHUNK_SIZE), cz = Math.floor(player.z/CHUNK_SIZE);
        for (let dx=-RENDER_DIST;dx<=RENDER_DIST;dx++) for (let dz=-RENDER_DIST;dz<=RENDER_DIST;dz++) {
            const key = `${cx+dx},${cz+dz}`; if (!chunkData.has(key)) { chunkData.set(key, generateChunk(cx+dx, cz+dz)); const mesh = buildChunkMesh(cx+dx, cz+dz); if (mesh) { scene.add(mesh); chunkMeshes.set(key, mesh); } } else if (!chunkMeshes.has(key)) { const mesh = buildChunkMesh(cx+dx, cz+dz); if (mesh) { scene.add(mesh); chunkMeshes.set(key, mesh); } }
        }
        for (let [key, mesh] of chunkMeshes) { const [cxk, czk] = key.split(',').map(Number); if (Math.abs(cxk-cx)>RENDER_DIST+1 || Math.abs(czk-cz)>RENDER_DIST+1) { scene.remove(mesh); chunkMeshes.delete(key); } }
        document.getElementById('chunkStat').innerText = chunkMeshes.size;
    }

    function handleInput(delta) {
        const speed = keys.shift ? 8 : 4; let move = { x:0, z:0 };

        if (keys.space && player.onGround) { player.vY = 5; player.onGround = false; }
        player.vY -= 15*delta; player.y += player.vY*delta;

    function setupGraphics() {

        const starTex = (()=>{ const c=document.createElement('canvas'); c.width=512; c.height=512; const ctx=c.getContext('2d'); ctx.fillStyle='black'; ctx.fillRect(0,0,512,512); for(let i=0;i<2000;i++){ ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.8})`; ctx.fillRect(Math.random()*512,Math.random()*512,1,1); } return new THREE.CanvasTexture(c); })();
        skybox = new THREE.Mesh(new THREE.SphereGeometry(200,32,32), new THREE.MeshBasicMaterial({ map:starTex, side:THREE.BackSide })); scene.add(skybox);
        const dustGeom = new THREE.BufferGeometry(), dustPos = new Float32Array(2000*3); for(let i=0;i<2000;i++){ dustPos[i*3]=(Math.random()-0.5)*120; dustPos[i*3+1]=Math.random()*20; dustPos[i*3+2]=(Math.random()-0.5)*120; } dustGeom.setAttribute('position', new THREE.BufferAttribute(dustPos,3)); dustParticles = new THREE.Points(dustGeom, new THREE.PointsMaterial({ color:0xaa8866, size:0.05 })); scene.add(dustParticles);
        fireflyParticles = new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({ color:0xffaa66, size:0.08, blending:THREE.AdditiveBlending })); scene.add(fireflyParticles);
        const lensTex = (()=>{ const c=document.createElement('canvas'); c.width=64; c.height=64; const ctx=c.getContext('2d'); ctx.fillStyle='rgba(255,200,100,0.8)'; ctx.beginPath(); ctx.arc(32,32,28,0,2*Math.PI); ctx.fill(); return new THREE.CanvasTexture(c); })();
        lensFlareSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map:lensTex, blending:THREE.AdditiveBlending })); lensFlareSprite.scale.set(0.5,0.5,1); scene.add(lensFlareSprite);
    }

    let timeAcc = 0;
    function updateDynamicGraphics(delta) {
        timeAcc += delta; timeOfDay += delta*0.02; if(timeOfDay>1) timeOfDay-=1;
        const sunAngle = timeOfDay*Math.PI*2, sunX = Math.cos(sunAngle)*30, sunY = Math.sin(sunAngle)*20;
        sunLight.position.set(sunX, sunY+5, 5); const intensity = Math.max(0.2, Math.sin(sunAngle)*0.8+0.4);
        sunLight.intensity = intensity; ambientLight.intensity = 0.3+intensity*0.3;
        const skyHue = 0.55 - Math.sin(sunAngle)*0.1; scene.background.setHSL(skyHue, 0.8, 0.2+intensity*0.3); skybox.material.color.setHSL(skyHue, 0.8, 0.1);
        const sunDir = new THREE.Vector3(sunX, sunY, 0).normalize(), camDir = camera.getWorldDirection(new THREE.Vector3());
        lensFlareSprite.material.opacity = camDir.dot(sunDir)>0.8 ? 0.8 : 0; lensFlareSprite.position.copy(sunLight.position.clone().normalize().multiplyScalar(10));
        if (Math.random()<0.0005) { weather = weather==='sunny'?'rainy':weather==='rainy'?'snowy':'sunny'; document.getElementById('weatherIcon').innerHTML = weather==='sunny'?'☀️ Sunny':weather==='rainy'?'🌧️ Rainy':'❄️ Snowy'; }
        if (weather==='rainy' && !rainParticles) { const geo=new THREE.BufferGeometry(),pos=new Float32Array(3000*3); for(let i=0;i<3000;i++){pos[i*3]=(Math.random()-0.5)*150;pos[i*3+1]=Math.random()*40;pos[i*3+2]=(Math.random()-0.5)*150;} geo.setAttribute('position',new THREE.BufferAttribute(pos,3)); rainParticles=new THREE.Points(geo,new THREE.PointsMaterial({color:0xaaddff,size:0.08})); scene.add(rainParticles); }
        if (weather==='snowy' && !snowParticles) { const geo=new THREE.BufferGeometry(),pos=new Float32Array(4000*3); for(let i=0;i<4000;i++){pos[i*3]=(Math.random()-0.5)*150;pos[i*3+1]=Math.random()*40;pos[i*3+2]=(Math.random()-0.5)*150;} geo.setAttribute('position',new THREE.BufferAttribute(pos,3)); snowParticles=new THREE.Points(geo,new THREE.PointsMaterial({color:0xffffff,size:0.06})); scene.add(snowParticles); }
        if (rainParticles) rainParticles.visible = weather==='rainy'; if (snowParticles) snowParticles.visible = weather==='snowy';
        if (fireflyParticles.geometry.attributes.position) { const pos = fireflyParticles.geometry.attributes.position.array; for(let i=0;i<pos.length/3;i++){ pos[i*3]+=(Math.random()-0.5)*0.08; pos[i*3+1]+=(Math.random()-0.5)*0.04; pos[i*3+2]+=(Math.random()-0.5)*0.08; if(Math.abs(pos[i*3])>70) pos[i*3]=(Math.random()-0.5)*70; if(pos[i*3+1]>25) pos[i*3+1]=0; if(pos[i*3+1]<0) pos[i*3+1]=25; if(Math.abs(pos[i*3+2])>70) pos[i*3+2]=(Math.random()-0.5)*70; } fireflyParticles.geometry.attributes.position.needsUpdate = true; }
        if (waterMesh) waterMesh.position.y = 0.1 + Math.sin(timeAcc*2)*0.03;
    }

    function updateUI() {
        document.getElementById('profitValue').innerText = Math.floor(plt.profit); document.getElementById('profitBar').style.width = plt.profit+'%';
        document.getElementById('loveValue').innerText = Math.floor(plt.love); document.getElementById('loveBar').style.width = plt.love+'%';
        document.getElementById('taxValue').innerText = Math.floor(plt.tax); document.getElementById('taxBar').style.width = plt.tax+'%';
        document.getElementById('soulList').innerHTML = souls.length===0 ? 'None' : souls.map(s=>`<div>${s.name} (${s.type})</div>`).join('');
        document.getElementById('timeIcon').innerHTML = timeOfDay<0.2||timeOfDay>0.8 ? '🌙 Night' : '🌞 Day';
    }

    function updateFPS() { frameCount++; const now=performance.now(); if(now-lastTime>=1000){ fps=frameCount; document.getElementById('fpsStat').innerText=fps; frameCount=0; lastTime=now; } }

    function saveWorld() { const d={version:1,timestamp:Date.now(),chunkData:Array.from(chunkData.entries()),player:{x:player.x,y:player.y,z:player.z},plt:{...plt},souls:[...souls],selectedBlock}; try{localStorage.setItem('soulverseVoxelWorld',JSON.stringify(d));document.getElementById('saveStatus').innerText='Saved '+new Date().toLocaleTimeString();document.getElementById('saveStatus').style.color='#4a8';alert('World saved!');}catch(e){document.getElementById('saveStatus').innerText='Failed: '+e.message;document.getElementById('saveStatus').style.color='#f44';} }
    function loadWorld() { const s=localStorage.getItem('soulverseVoxelWorld');if(!s){alert('No save found.');return;}try{const d=JSON.parse(s);for(const[k,m]of chunkMeshes)scene.remove(m);chunkMeshes.clear();chunkData.clear();if(d.chunkData){for(const[k,b]of d.chunkData){chunkData.set(k,b);const[cx,cz]=k.split(',').map(Number);rebuildChunkMesh(cx,cz);}}if(d.player){player.x=d.player.x||0;player.y=d.player.y||10;player.z=d.player.z||0;}if(d.plt)plt={...d.plt};if(d.souls)souls=[...d.souls];if(d.selectedBlock!==undefined)selectedBlock=d.selectedBlock;updateUI();updateChunks();document.getElementById('saveStatus').innerText='Loaded '+new Date(d.timestamp).toLocaleString();document.getElementById('saveStatus').style.color='#4a8';alert('World loaded!');}catch(e){document.getElementById('saveStatus').innerText='Failed: '+e.message;document.getElementById('saveStatus').style.color='#f44';}}
    function clearWorld() { if(!confirm('Clear all?'))return; for(const[k,m]of chunkMeshes)scene.remove(m);chunkMeshes.clear();chunkData.clear();player.x=0;player.y=10;player.z=0;plt={profit:100,love:100,tax:100,realm:100};updateUI();updateChunks();document.getElementById('saveStatus').innerText='Cleared';document.getElementById('saveStatus').style.color='#fa4'; }

    function forgeSoul() { const p=document.getElementById('profitSlider').value/100,l=document.getElementById('loveSlider').value/100,t=document.getElementById('taxSlider').value/100;const n=prompt('Soul name:','New Soul');if(!n)return;const type=p>l&&p>t?'profit':l>p&&l>t?'love':'tax';souls.push({id:Date.now(),name:n,type,plt:{profit:p,love:l,tax:t},energy:100});updateUI();alert(`Soul "${n}" forged!`); }
    function syncSoulverse() { const s=localStorage.getItem('soulforge_souls');if(s){souls=JSON.parse(s);updateUI();alert(`Synced ${souls.length} souls.`);}else alert('No souls found.'); }

    function mainLoop() {
        const now=performance.now(), delta=Math.min(0.033,(now-lastTime)/1000);
        handleInput(delta); handleBlockInteraction(); updateChunks(); updateDynamicGraphics(delta); updateUI(); updateFPS();
        camera.position.x=player.x; camera.position.y=player.y+1.6; camera.position.z=player.z;
        composer.render(); requestAnimationFrame(mainLoop);
    }

    function init() {
        setupGraphics();
        controls = new OrbitControls(camera, renderer.domElement); controls.enableZoom=false; controls.enablePan=false; controls.mouseButtons={LEFT:THREE.MOUSE.ROTATE,RIGHT:THREE.MOUSE.PAN};
        window.addEventListener('keydown',e=>{switch(e.code){case'KeyW':keys.w=1;break;case'KeyS':keys.s=1;break;case'KeyA':keys.a=1;break;case'KeyD':keys.d=1;break;case'Space':keys.space=1;e.preventDefault();break;case'ShiftLeft':keys.shift=1;break;case'Digit1':selectedBlock=BLOCK_TYPES.GRASS;break;case'Digit2':selectedBlock=BLOCK_TYPES.STONE;break;case'Digit3':selectedBlock=BLOCK_TYPES.PROFIT;break;case'Digit4':selectedBlock=BLOCK_TYPES.LOVE;break;case'Digit5':selectedBlock=BLOCK_TYPES.TAX;break;}});
        window.addEventListener('keyup',e=>{switch(e.code){case'KeyW':keys.w=0;break;case'KeyS':keys.s=0;break;case'KeyA':keys.a=0;break;case'KeyD':keys.d=0;break;case'Space':keys.space=0;break;case'ShiftLeft':keys.shift=0;break;}});
        const canvas=document.getElementById('canvas'); canvas.addEventListener('click',()=>canvas.requestPointerLock());
        document.addEventListener('pointerlockchange',()=>{mouseLocked=document.pointerLockElement===canvas;});
        document.addEventListener('mousemove',e=>{if(!mouseLocked)return;camera.rotation.order='YXZ';camera.rotation.y-=e.movementX*0.002;camera.rotation.x-=e.movementY*0.002;camera.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,camera.rotation.x));});
        window.addEventListener('mousedown',e=>{if(e.button===0)window.breakRequest=true;if(e.button===2){window.placeRequest=true;e.preventDefault();}});
        window.addEventListener('contextmenu',e=>e.preventDefault());
        document.getElementById('forgeBtn').addEventListener('click',forgeSoul); document.getElementById('syncBtn').addEventListener('click',syncSoulverse);
        document.getElementById('saveBtn').addEventListener('click',saveWorld); document.getElementById('loadBtn').addEventListener('click',loadWorld); document.getElementById('clearBtn').addEventListener('click',clearWorld);
        const updateSliders=()=>{document.getElementById('profitVal').innerText=document.getElementById('profitSlider').value+'%';document.getElementById('loveVal').innerText=document.getElementById('loveSlider').value+'%';document.getElementById('taxVal').innerText=document.getElementById('taxSlider').value+'%';};
        document.getElementById('profitSlider').addEventListener('input',updateSliders);document.getElementById('loveSlider').addEventListener('input',updateSliders);document.getElementById('taxSlider').addEventListener('input',updateSliders);updateSliders();
        const saved=localStorage.getItem('soulforge_souls');if(saved)souls=JSON.parse(saved);else souls=[{name:'Profit Prime',type:'profit'}];
        updateChunks(); updateUI(); mainLoop();
    }

    init();
</script>
</body>
</html>
